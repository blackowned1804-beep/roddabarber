<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f1115" />
<title>Charrod — Scan to get in line</title>
<link rel="stylesheet" href="/style.css" />
<style>
  @media print { body { background:#fff; } .noprint { display:none !important; } .card { box-shadow:none; border:none; } .printbox { color:#000; } }
  .printbox { background:#fff; border-radius:18px; padding:24px; text-align:center; color:#111; }
  .printbox h1 { margin:6px 0; }
  .printbox img { width:300px; height:300px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand noprint">
    <div class="mark">📱</div>
    <div><h1>Station QR code</h1><div class="sub">Print this and put it on the chair</div></div>
  </div>

  <div class="card">
    <div class="printbox">
      <div style="font-size:34px">✂️</div>
      <h1>Charrod the Barber</h1>
      <p style="margin:2px 0 14px;font-weight:700">Scan to get in line</p>
      <img id="qrImg" alt="QR code" />
      <p id="urlText" style="font-size:12px;color:#555;word-break:break-all"></p>
      <p style="margin-top:10px;font-weight:600">No smartphone? Just ask Charrod to add you.</p>
    </div>
  </div>

  <div class="card noprint">
    <label>Public web address (where clients land)</label>
    <input id="baseUrl" placeholder="https://your-app-url.com" />
    <p class="small muted">For testing this is localhost. Once it's online, paste the real address here and re-print so the QR works on any phone.</p>
    <div class="row">
      <button class="btn" id="regen" style="margin-top:0">Update QR</button>
      <button class="btn secondary" id="printBtn" style="margin-top:0" onclick="window.print()">🖨 Print</button>
    </div>
    <a class="btn secondary" href="/barber">← Back to dashboard</a>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
async function load(url) {
  const q = url ? ('?url=' + encodeURIComponent(url)) : '';
  const r = await fetch('/api/qr' + q);
  const d = await r.json();
  $('qrImg').src = d.dataUrl;
  $('urlText').textContent = d.url;
}
$('regen').onclick = () => load($('baseUrl').value.trim());
load();
</script>
</body>
</html>
