services:
  - type: web
    name: roddabarber
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    autoDeploy: true
    envVars:
      - key: BARBER_PIN
        sync: false        # set this in the Render dashboard (don't commit the PIN)
      - key: NODE_VERSION
        value: "20"
